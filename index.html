<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <title>Thuận Store V2 - Reactive Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --brand-color: #0055A5; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #0f172a; margin: 0; padding: 0; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(226, 232, 240, 0.8); }
        .app-screen { position: fixed; inset: 0; display: flex; flex-direction: column; visibility: hidden; opacity: 0; transition: all 0.3s ease; z-index: -1; }
        .app-screen.active { visibility: visible; opacity: 1; z-index: 10; }
        .cyber-grid { position: absolute; inset: 0; background-image: linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px); background-size: 40px 40px; mask-image: radial-gradient(circle, black 40%, transparent 80%); }
        
        /* Hiệu ứng Orbit */
        @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .orbit-track { position: absolute; inset: -55px; border-radius: 50%; border: 1.5px dashed rgba(6, 182, 212, 0.25); animation: orbit 40s linear infinite; }
        .sat-node { width: 60px; height: 60px; background: rgba(15, 23, 42, 0.9); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; items-center; justify-center; cursor: pointer; transition: 0.3s; pointer-events: auto; }
        .sat-node:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(6, 182, 212, 0.5); }
        
        /* Modal */
        .fullscreen-modal { position: fixed; inset: 0; background: #f8fafc; z-index: 100; transform: translateY(100%); transition: 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        .fullscreen-modal.active { transform: translateY(0); }
    </style>
</head>
<body>
    <div id="customToast" class="fixed top-5 left-1/2 -translate-x-1/2 -translate-y-20 bg-slate-900 text-white px-6 py-3 rounded-full font-bold transition-all duration-400 z-[9999] shadow-2xl flex items-center gap-2">
        <span id="toastMsg"></span>
    </div>

    <!-- MÀN HÌNH CHÀO (LANDING) -->
    <main id="screenLanding" class="app-screen active justify-center items-center">
        <div class="cyber-grid"></div>
        <header class="absolute top-10 text-center">
            <h1 class="text-3xl font-black text-white tracking-widest uppercase">Thuận Store</h1>
            <p class="text-cyan-400 text-[10px] font-bold tracking-[0.4em] mt-2">VERSION 2.0 - REACTIVE</p>
        </header>

        <div class="relative w-64 h-64 flex items-center justify-center">
            <div class="orbit-track">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 sat-node text-blue-400" onclick="switchScreen('setup')">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"></path></svg>
                </div>
            </div>
            <div id="btnStartApp" class="z-20 bg-slate-950 border-2 border-cyan-500/50 w-48 h-48 rounded-full flex flex-col items-center justify-center text-center cursor-pointer hover:scale-105 transition-transform">
                <span class="text-white font-black text-2xl">BÁO GIÁ</span>
                <div class="h-0.5 w-10 bg-cyan-500 my-2"></div>
                <span class="text-cyan-400 text-[9px] font-bold animate-pulse">CHẠM ĐỂ BẮT ĐẦU</span>
            </div>
        </div>
    </main>

    <!-- MÀN HÌNH CHÍNH (GIỎ HÀNG) -->
    <div id="screenMain" class="app-screen bg-slate-50">
        <nav class="bg-white p-4 border-b flex justify-between items-center sticky top-0 z-30">
            <button onclick="switchScreen('landing')" class="p-2 bg-slate-100 rounded-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg></button>
            <span class="font-black text-slate-800">GIỎ HÀNG (<span id="cartCount">0</span>)</span>
            <div class="flex gap-2">
                <button onclick="switchScreen('setup')" class="p-2 bg-blue-50 text-blue-600 rounded-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7"></path></svg></button>
                <button onclick="openModal('brandModal')" class="p-2 bg-slate-100 rounded-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572"></path></svg></button>
            </div>
        </nav>
        
        <div class="p-4 flex gap-2">
            <button onclick="openModal('searchModal')" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-black text-xs uppercase shadow-lg">+ Thêm Sản Phẩm</button>
            <button onclick="confirmReset()" class="w-12 bg-rose-50 text-rose-600 rounded-xl border border-rose-200 flex items-center justify-center"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></button>
        </div>

        <main id="quoteList" class="flex-grow overflow-y-auto p-4 space-y-3 pb-40"></main>

        <footer class="fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur-xl border-t p-4 pb-safe shadow-2xl z-40">
            <div class="flex justify-between items-center max-w-5xl mx-auto">
                <div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Tổng thanh toán</p>
                    <p id="totalFinal" class="text-2xl font-black text-slate-900 leading-none">0 ₫</p>
                </div>
                <button onclick="prepareExport()" class="bg-slate-900 text-white px-8 py-3.5 rounded-xl font-black text-sm shadow-xl active:scale-95 transition-all">XUẤT BẢO GIÁ</button>
            </div>
        </footer>
    </div>
    <!-- MODAL TÌM KIẾM -->
    <div id="searchModal" class="fullscreen-modal flex flex-col">
        <div class="p-4 pt-12 bg-white border-b shrink-0">
            <div class="flex justify-between items-center mb-4">
                <button onclick="closeModal('searchModal')" class="text-slate-500 font-bold text-xs uppercase">Đóng</button>
                <h3 class="font-black text-slate-900">TÌM SẢN PHẨM</h3>
                <div class="w-10"></div>
            </div>
            <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="Nhập tên hoặc mã SP..." class="w-full bg-slate-100 border-none rounded-xl p-4 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 transition-all">
        </div>
        <div id="searchList" class="flex-grow overflow-y-auto divide-y divide-slate-100 bg-white pb-20"></div>
    </div>

    <!-- MODAL XUẤT FILE -->
    <div id="exportModal" class="fullscreen-modal flex flex-col bg-slate-100">
        <div class="p-4 pt-12 bg-white border-b flex justify-between items-center shrink-0">
            <button onclick="closeModal('exportModal')" class="text-slate-500 font-bold text-xs uppercase">Trở về</button>
            <span class="font-black">XUẤT BÁO GIÁ</span>
            <div class="w-10"></div>
        </div>
        <div class="flex-grow overflow-y-auto p-4 space-y-4">
            <div id="previewContainer" class="w-full bg-white shadow-xl rounded-xl overflow-hidden origin-top scale-[0.6] md:scale-100">
                <!-- Nội dung hóa đơn sẽ render tại đây khi nhấn Xuất -->
                <div id="invoiceRenderArea" class="p-10 text-[12px] text-slate-900 bg-white">
                    <h2 id="pDocTitle" class="text-3xl font-black text-center mb-8">BẢNG BÁO GIÁ</h2>
                    <table class="w-full border-collapse">
                        <thead class="bg-slate-900 text-white">
                            <tr>
                                <th class="p-2 border">STT</th>
                                <th class="p-2 border">Tên Sản Phẩm</th>
                                <th class="p-2 border">SL</th>
                                <th class="p-2 border text-right">Đơn Giá</th>
                                <th class="p-2 border text-right">Thành Tiền</th>
                            </tr>
                        </thead>
                        <tbody id="printTbody"></tbody>
                    </table>
                    <div class="mt-6 text-right font-black text-xl">Tổng: <span id="pTotalPrint">0 ₫</span></div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="exportToImage()" class="bg-blue-600 text-white p-4 rounded-xl font-bold text-xs uppercase shadow-md">Lưu Ảnh (JPG)</button>
                <button onclick="exportToExcel()" class="bg-emerald-600 text-white p-4 rounded-xl font-bold text-xs uppercase shadow-md">Xuất Excel</button>
            </div>
        </div>
    </div>

    <!-- MODAL CẤU HÌNH (SETUP) -->
    <div id="setupModal" class="fullscreen-modal flex flex-col bg-slate-50">
        <div class="p-4 pt-12 bg-white border-b flex justify-between items-center">
            <button onclick="closeModal('setupModal')" class="text-slate-500 font-bold text-xs uppercase">Đóng</button>
            <span class="font-black uppercase">Quản Lý Kho</span>
            <div class="w-10"></div>
        </div>
        <div class="p-6 space-y-6">
            <div class="glass-card p-6 border-dashed border-2 border-slate-300 text-center">
                <input type="file" id="fileExcel" class="hidden" accept=".xlsx, .xls" onchange="importExcel(this)">
                <label for="fileExcel" class="cursor-pointer block">
                    <svg class="w-12 h-12 text-slate-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <span class="text-sm font-bold text-slate-600">Bấm để tải file Excel Sản Phẩm</span>
                </label>
            </div>
            <div id="warehouseInfo" class="hidden glass-card p-4 bg-indigo-50 border-indigo-200">
                <p class="text-indigo-700 font-bold text-xs">Đã nạp: <span id="dbCount">0</span> sản phẩm</p>
            </div>
            <button onclick="clearDatabase()" class="w-full py-4 text-red-500 font-bold text-xs uppercase">Xóa toàn bộ dữ liệu kho</button>
        </div>
    </div>

    <script>
        // --- 1. CORE UTILS ---
        const fmt = (v) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(v || 0);
        const clean = (v) => typeof v === 'number' ? v : parseFloat(String(v).replace(/[^0-9.-]/g, "")) || 0;

        // --- 2. REACTIVE STATE (PROXY) ---
        const state = new Proxy({
            cart: JSON.parse(localStorage.getItem('ts_cart') || '[]'),
            db: JSON.parse(localStorage.getItem('ts_db') || '[]'),
            brand: JSON.parse(localStorage.getItem('ts_brand') || '{"name":"THUẬN STORE","title":"BẢNG BÁO GIÁ"}')
        }, {
            set(target, key, value) {
                target[key] = value;
                localStorage.setItem('ts_' + key, JSON.stringify(value));
                if (key === 'cart') renderCart();
                if (key === 'db') updateDBInfo();
                return true;
            }
        });

        // --- 3. UI CONTROLLERS ---
        function switchScreen(id) {
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('active');
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); if(id==='searchModal') handleSearch(''); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function showToast(msg) {
            const t = document.getElementById('customToast'); document.getElementById('toastMsg').innerText = msg;
            t.classList.add('translate-y-24'); setTimeout(() => t.classList.remove('translate-y-24'), 3000);
        }

        // --- 4. CART LOGIC ---
        function addToCart(p) {
            let cart = [...state.cart];
            if (cart.some(item => item.id === p.id)) { showToast("Sản phẩm đã có!"); return; }
            cart.push({ ...p, qty: 1, discount: 0, km1: 0, km2: 0 });
            state.cart = cart;
            showToast("Đã thêm vào giỏ");
        }

        function updateQty(index, val) {
            let cart = [...state.cart];
            cart[index].qty = Math.max(1, parseInt(val) || 1);
            state.cart = cart;
        }

        function updateDiscount(index, field, val) {
            let cart = [...state.cart];
            cart[index][field] = clean(val);
            state.cart = cart;
        }

        function removeFromCart(index) {
            let cart = [...state.cart]; cart.splice(index, 1); state.cart = cart;
        }

        function renderCart() {
            const list = document.getElementById('quoteList');
            let total = 0;
            list.innerHTML = state.cart.map((item, i) => {
                // Tính chiết khấu lũy tiến (Tiered)
                const p1 = item.price * (1 - (item.discount / 100));
                const p2 = p1 * (1 - (item.km1 / 100));
                const finalPrice = p2 * (1 - (item.km2 / 100));
                const lineTotal = finalPrice * item.qty;
                total += lineTotal;

                return `
                <div class="glass-card p-4 space-y-3 relative border-l-4 border-blue-500">
                    <div class="flex justify-between items-start">
                        <div class="flex-1 pr-2">
                            <h4 class="font-bold text-sm leading-tight">${item.name}</h4>
                            <p class="text-[10px] text-slate-500 mt-1">Gốc: ${fmt(item.price)}</p>
                        </div>
                        <button onclick="removeFromCart(${i})" class="text-rose-500 p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7"></path></svg></button>
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        <div><label class="text-[9px] font-bold block mb-1">SL</label><input type="number" value="${item.qty}" onchange="updateQty(${i}, this.value)" class="w-full bg-slate-100 p-2 rounded-lg text-xs font-bold text-center"></div>
                        <div><label class="text-[9px] font-bold block mb-1">CK(%)</label><input type="number" value="${item.discount}" onchange="updateDiscount(${i}, 'discount', this.value)" class="w-full bg-slate-100 p-2 rounded-lg text-xs font-bold text-center"></div>
                        <div><label class="text-[9px] font-bold block mb-1">KM1</label><input type="number" value="${item.km1}" onchange="updateDiscount(${i}, 'km1', this.value)" class="w-full bg-slate-100 p-2 rounded-lg text-xs font-bold text-center"></div>
                        <div><label class="text-[9px] font-bold block mb-1">KM2</label><input type="number" value="${item.km2}" onchange="updateDiscount(${i}, 'km2', this.value)" class="w-full bg-slate-100 p-2 rounded-lg text-xs font-bold text-center"></div>
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t border-slate-100">
                        <span class="text-[10px] font-bold text-blue-600">Đơn giá CK: ${fmt(finalPrice)}</span>
                        <span class="text-sm font-black text-slate-900">${fmt(lineTotal)}</span>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('totalFinal').innerText = fmt(total);
            document.getElementById('cartCount').innerText = state.cart.length;
        }

        // --- 5. EXCEL & SEARCH ---
        function importExcel(input) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet);
                
                // Map dữ liệu (tùy chỉnh cột theo file của bạn)
                state.db = json.map((r, idx) => ({
                    id: 'p' + idx,
                    name: r['Tên sản phẩm'] || r['Name'] || Object.values(r)[1],
                    price: clean(r['Giá bìa'] || r['Price'] || Object.values(r)[2]),
                    code: r['Mã hàng'] || r['Code'] || ''
                })).filter(p => p.name && p.price > 0);
                showToast("Đã nhập " + state.db.length + " sản phẩm");
            };
            reader.readAsArrayBuffer(file);
        }

        function handleSearch(val) {
            const term = val.toLowerCase();
            const results = state.db.filter(p => p.name.toLowerCase().includes(term) || p.code.toLowerCase().includes(term)).slice(0, 50);
            document.getElementById('searchList').innerHTML = results.map(p => `
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-slate-900 text-sm">${p.name}</p>
                        <p class="text-blue-600 font-bold text-xs">${fmt(p.price)}</p>
                    </div>
                    <button onclick='addToCart(${JSON.stringify(p)})' class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Thêm</button>
                </div>
            `).join('');
        }

        // --- 6. EXPORT ---
        function prepareExport() {
            if(state.cart.length === 0) return showToast("Giỏ hàng trống!");
            const tbody = document.getElementById('printTbody');
            let total = 0;
            tbody.innerHTML = state.cart.map((item, i) => {
                const p1 = item.price * (1 - (item.discount / 100));
                const p2 = p1 * (1 - (item.km1 / 100));
                const finalPrice = p2 * (1 - (item.km2 / 100));
                const lineTotal = finalPrice * item.qty;
                total += lineTotal;
                return `<tr><td class="p-2 border text-center">${i+1}</td><td class="p-2 border">${item.name}</td><td class="p-2 border text-center">${item.qty}</td><td class="p-2 border text-right">${fmt(finalPrice)}</td><td class="p-2 border text-right">${fmt(lineTotal)}</td></tr>`;
            }).join('');
            document.getElementById('pTotalPrint').innerText = fmt(total);
            openModal('exportModal');
        }

        async function exportToImage() {
            const area = document.getElementById('invoiceRenderArea');
            const canvas = await html2canvas(area, { scale: 2 });
            const link = document.createElement('a');
            link.download = 'BaoGia_ThuanStore.jpg';
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        }

        function confirmReset() { if(confirm("Xóa giỏ hàng hiện tại?")) state.cart = []; }
        function clearDatabase() { if(confirm("Xóa toàn bộ dữ liệu kho?")) state.db = []; }
        function updateDBInfo() {
            const info = document.getElementById('warehouseInfo');
            if(state.db.length > 0) { info.classList.remove('hidden'); document.getElementById('dbCount').innerText = state.db.length; }
            else info.classList.add('hidden');
        }

        // Khởi tạo
        document.getElementById('btnStartApp').onclick = () => switchScreen('main');
        renderCart(); updateDBInfo();
    </script>
</body>
</html>
